replicaCount: 1

# LET OP: de gzac-frontend chart vereist een custom image.
# Gebruik de gzac-frontend-template van:
#   https://github.com/generiekzaakafhandelcomponent/gzac-frontend-template
# Bouw en publiceer je eigen image, en pas onderstaande repository/tag aan.
image:
  repository: ritense/valtimo-frontend
  tag: "13.12.0"

settings:
  # /api prefix zorgt dat calls als /api/v1/... lopen — matcht nginx proxy rule /(api|...)
  apiURL: https://gzac.foundationlayer.nl/api
  whitelistedDomain: gzac.foundationlayer.nl

  keycloak:
    url: https://keycloak.foundationlayer.nl
    clientID: gzac-console
    realm: gzac
    redirectURL: https://gzac.foundationlayer.nl/keycloak/callback
    logoutRedirectURL: https://gzac.foundationlayer.nl

ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: gzac.foundationlayer.nl
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: gzac-tls
      hosts:
        - gzac.foundationlayer.nl
