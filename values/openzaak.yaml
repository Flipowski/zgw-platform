replicaCount: 2

image:
  tag: "1.27.0"

# Verwijs naar een bestaand Secret met de sleutels:
#   SECRET_KEY   - Django geheime sleutel (genereer op https://djecrety.ir/)
#   DB_PASSWORD  - PostgreSQL wachtwoord (zelfde als in secrets/openzaak-db-credentials.yaml)
existingSecret: "openzaak-secrets"

settings:
  disable2fa: true
  allowedHosts: "openzaak.foundationlayer.nl"
  isHttps: true
  useXForwardedHost: true
  numProxies: 1
  notificationsDisabled: false
  siteDomain: "openzaak.foundationlayer.nl"

  database:
    host: "openzaak-postgres-rw.postgresql.svc.cluster.local"
    port: 5432
    name: "openzaak"
    username: "openzaak"
    # password komt uit existingSecret (sleutel: DB_PASSWORD)
    sslmode: prefer

  # cache en celery worden automatisch ingevuld door de Redis subchart
  cache:
    default: ""
    axes: ""
  celery:
    brokerUrl: ""
    resultBackend: ""

ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: openzaak.foundationlayer.nl
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: openzaak-tls
      hosts:
        - openzaak.foundationlayer.nl

worker:
  replicaCount: 2

persistence:
  existingClaim: openzaak-media

configuration:
  enabled: true
  overwrite: true
  superuser:
    username: admin
    email: admin@foundationlayer.nl
  job:
    enabled: true
  secrets:
    openzaak_notif_token: openzaak-secrets
  data: |-
    sites_config_enable: true
    sites_config:
      items:
        - domain: openzaak.foundationlayer.nl
          name: Open Zaak
    zgw_consumers_config_enable: true
    zgw_consumers:
      services:
        - identifier: notifications-api
          label: Notificaties API
          api_root: https://notificaties.foundationlayer.nl/api/v1/
          api_connection_check_path: notificaties
          api_type: nrc
          auth_type: api_key
          header_key: Authorization
          header_value:
            value_from:
              env: openzaak_notif_token
    notifications_config_enable: true
    notifications_config:
      notifications_api_service_identifier: notifications-api
      notification_delivery_max_retries: 3
      notification_delivery_retry_backoff: 3
      notification_delivery_retry_backoff_max: 48

redis:
  master:
    persistence:
      size: 4Gi
