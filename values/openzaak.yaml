replicaCount: 2

image:
  tag: "1.27.0"

# Verwijs naar een bestaand Secret met de sleutels:
#   SECRET_KEY   - Django geheime sleutel (genereer op https://djecrety.ir/)
#   DB_PASSWORD  - PostgreSQL wachtwoord (zelfde als in secrets/openzaak-db-credentials.yaml)
existingSecret: "openzaak-secrets"

settings:
  allowedHosts: "openzaak.foundationlayer.nl"
  isHttps: true
  useXForwardedHost: true
  numProxies: 1
  notificationsDisabled: false
  siteDomain: "openzaak.foundationlayer.nl"

  database:
    host: "openzaak-postgres-rw.postgresql.svc.cluster.local"
    port: 5432
    name: "openzaak"
    username: "openzaak"
    # password komt uit existingSecret (sleutel: DB_PASSWORD)
    sslmode: prefer

  # cache en celery worden automatisch ingevuld door de Redis subchart
  cache:
    default: ""
    axes: ""
  celery:
    brokerUrl: ""
    resultBackend: ""

ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: openzaak.foundationlayer.nl
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: openzaak-tls
      hosts:
        - openzaak.foundationlayer.nl

worker:
  replicaCount: 2

persistence:
  existingClaim: openzaak-media

redis:
  master:
    persistence:
      size: 4Gi
