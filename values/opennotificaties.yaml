replicaCount: 2

image:
  tag: "1.14.0"

# Verwijs naar een bestaand Secret met de sleutels:
#   SECRET_KEY   - Django geheime sleutel (genereer op https://djecrety.ir/)
#   DB_PASSWORD  - PostgreSQL wachtwoord (zelfde als in secrets/opennotificaties-db-credentials.yaml)
existingSecret: "opennotificaties-secrets"

settings:
  disable2fa: true
  allowedHosts: "notificaties.foundationlayer.nl"
  isHttps: true
  useXForwardedHost: true
  numProxies: 1
  siteDomain: "notificaties.foundationlayer.nl"
  logNotifications: true

  database:
    host: "opennotificaties-postgres-rw.postgresql.svc.cluster.local"
    port: 5432
    name: "opennotificaties"
    username: "opennotificaties"
    # password komt uit existingSecret (sleutel: DB_PASSWORD)
    sslmode: prefer

  # cache en celery/rabbitmq worden automatisch ingevuld door de subcharts
  cache:
    default: ""
    axes: ""
  celery:
    brokerUrl: ""
    resultBackend: ""
    publishBrokerUrl: ""

ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: notificaties.foundationlayer.nl
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: opennotificaties-tls
      hosts:
        - notificaties.foundationlayer.nl

extraEnvVars:
  - name: CSRF_TRUSTED_ORIGINS
    value: "https://notificaties.foundationlayer.nl"

worker:
  replicaCount: 2

persistence:
  existingClaim: opennotificaties-media

configuration:
  enabled: true
  overwrite: true
  superuser:
    username: admin
    email: admin@foundationlayer.nl
  job:
    enabled: true
  secrets:
    openzaak_notif_token: opennotificaties-secrets
    objecten_notif_token: opennotificaties-secrets
  data: |-
    sites_config_enable: true
    sites_config:
      items:
        - domain: notificaties.foundationlayer.nl
          name: Open Notificaties
    tokenauth_config_enable: true
    tokenauth:
      items:
        - identifier: openzaak-token
          token:
            value_from:
              env: openzaak_notif_token
          contact_person: Admin
          email: admin@foundationlayer.nl
          organization: Foundation Layer
        - identifier: objecten-token
          token:
            value_from:
              env: objecten_notif_token
          contact_person: Admin
          email: admin@foundationlayer.nl
          organization: Foundation Layer

redis:
  master:
    persistence:
      size: 2Gi

rabbitmq:
  auth:
    username: opennotificaties
    password: "dummy"  # wordt overschreven via existingPasswordSecret
    existingPasswordSecret: "opennotificaties-rabbitmq"
    existingErlangSecret: "opennotificaties-rabbitmq"
  persistence:
    enabled: false
