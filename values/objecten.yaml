replicaCount: 2

image:
  tag: "2.4.3"

# Verwijs naar een bestaand Secret met de sleutels:
#   SECRET_KEY   - Django geheime sleutel (genereer op https://djecrety.ir/)
#   DB_PASSWORD  - PostgreSQL wachtwoord (zelfde als in secrets/objecten-db-credentials.yaml)
existingSecret: "objecten-secrets"

settings:
  disable2fa: true
  allowedHosts: "objecten.foundationlayer.nl"
  isHttps: true
  useXForwardedHost: true
  numProxies: 1
  siteDomain: "objecten.foundationlayer.nl"

  database:
    host: "objecten-postgres-rw.postgresql.svc.cluster.local"
    port: 5432
    name: "objecten"
    username: "objecten"
    # password komt uit existingSecret (sleutel: DB_PASSWORD)
    sslmode: prefer

  cache:
    default: ""
    axes: ""
  celery:
    brokerUrl: ""
    resultBackend: ""

ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: objecten.foundationlayer.nl
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: objecten-tls
      hosts:
        - objecten.foundationlayer.nl

worker:
  replicaCount: 2

persistence:
  existingClaim: objecten-media

configuration:
  enabled: true
  overwrite: true
  superuser:
    username: admin
    email: admin@foundationlayer.nl
  job:
    enabled: true
  secrets:
    objecten_notif_token: objecten-secrets
    objecten_objecttypen_token: objecten-secrets
  data: |-
    sites_config_enable: true
    sites_config:
      items:
        - domain: objecten.foundationlayer.nl
          name: Objecten
    zgw_consumers_config_enable: true
    zgw_consumers:
      services:
        - identifier: objecttypen-api
          label: Objecttypen API
          api_root: https://objecttypen.foundationlayer.nl/api/v2/
          api_connection_check_path: objecttypes
          api_type: orc
          auth_type: api_key
          header_key: Authorization
          header_value:
            value_from:
              env: objecten_objecttypen_token
        - identifier: notifications-api
          label: Notificaties API
          api_root: https://notificaties.foundationlayer.nl/api/v1/
          api_connection_check_path: notificaties
          api_type: nrc
          auth_type: api_key
          header_key: Authorization
          header_value:
            value_from:
              env: objecten_notif_token
    notifications_config_enable: true
    notifications_config:
      notifications_api_service_identifier: notifications-api
      notification_delivery_max_retries: 3
      notification_delivery_retry_backoff: 3
      notification_delivery_retry_backoff_max: 48

redis:
  master:
    persistence:
      size: 2Gi
