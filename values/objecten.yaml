replicaCount: 2

image:
  tag: "2.4.3"

# Verwijs naar een bestaand Secret met de sleutels:
#   SECRET_KEY   - Django geheime sleutel (genereer op https://djecrety.ir/)
#   DB_PASSWORD  - PostgreSQL wachtwoord (zelfde als in secrets/objecten-db-credentials.yaml)
existingSecret: "objecten-secrets"

settings:
  allowedHosts: "objecten.foundationlayer.nl"
  isHttps: true
  useXForwardedHost: true
  numProxies: 1
  siteDomain: "objecten.foundationlayer.nl"

  database:
    host: "objecten-postgres-rw.postgresql.svc.cluster.local"
    port: 5432
    name: "objecten"
    username: "objecten"
    # password komt uit existingSecret (sleutel: DB_PASSWORD)
    sslmode: prefer

  cache:
    default: ""
    axes: ""
  celery:
    brokerUrl: ""
    resultBackend: ""

ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: objecten.foundationlayer.nl
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: objecten-tls
      hosts:
        - objecten.foundationlayer.nl

worker:
  replicaCount: 2

redis:
  master:
    persistence:
      size: 2Gi
