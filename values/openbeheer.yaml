replicaCount: 2

image:
  repository: maykinmedia/open-beheer
  tag: "0.9.0"

# Verwijs naar een bestaand Secret met de sleutels:
#   SECRET_KEY   - Django geheime sleutel (genereer op https://djecrety.ir/)
#   DB_PASSWORD  - PostgreSQL wachtwoord (zelfde als in secrets/openbeheer-db-credentials.yaml)
existingSecret: "openbeheer-secrets"

settings:
  allowedHosts: "openbeheer.foundationlayer.nl"
  isHttps: true
  useXForwardedHost: true
  apiDomain: "openbeheer.foundationlayer.nl"
  openzaakBaseUrl: "https://openzaak.foundationlayer.nl"

  database:
    host: "openbeheer-postgres-rw.postgresql.svc.cluster.local"
    port: 5432
    name: "openbeheer"
    username: "openbeheer"
    # password komt uit existingSecret (sleutel: DB_PASSWORD)
    sslmode: prefer

  cache:
    default: ""
    axes: ""

ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: openbeheer.foundationlayer.nl
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: openbeheer-tls
      hosts:
        - openbeheer.foundationlayer.nl

extraEnvVars:
  - name: CSRF_TRUSTED_ORIGINS
    value: "https://openbeheer.foundationlayer.nl"

persistence:
  existingClaim: openbeheer-media

configuration:
  enabled: true
  overwrite: true
  job:
    enabled: true
  secrets:
    OBJECTTYPEN_OPENBEHEER_API_HEADER_VALUE: openbeheer-secrets
    OPENZAAK_APPLICATION_SECRET: openbeheer-secrets
  data: |-
    zgw_consumers_config_enable: true
    zgw_consumers:
      services:
        - identifier: objecttypen-service
          label: Objecttypen API
          api_root: https://objecttypen.foundationlayer.nl/api/v2/
          api_type: orc
          auth_type: api_key
          header_key: Authorization
          header_value:
            value_from:
              env: OBJECTTYPEN_OPENBEHEER_API_HEADER_VALUE
        - identifier: catalogi-service
          label: Open Zaak - Catalogi API
          api_root: https://openzaak.foundationlayer.nl/catalogi/api/v1/
          api_type: ztc
          auth_type: zgw
          client_id: openbeheer.foundationlayer.nl
          secret:
            value_from:
              env: OPENZAAK_APPLICATION_SECRET
        - identifier: selectielijst-service
          label: Selectielijst API
          api_root: https://selectielijst.openzaak.nl/api/v1/
          api_type: orc
          auth_type: no_auth
    api_configuration_enabled: true
    api_configuration:
      selectielijst_service_identifier: selectielijst-service
      objecttypen_service_identifier: objecttypen-service

redis:
  master:
    persistence:
      size: 4Gi
