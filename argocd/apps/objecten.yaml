apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: objecten
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://maykinmedia.github.io/charts/
      chart: objecten
      targetRevision: "2.12.0"
      helm:
        valueFiles:
          - $values/values/objecten.yaml
    - repoURL: https://github.com/Flipowski/zgw-platform
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: objecten
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
