apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: objecttypen
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://maykinmedia.github.io/charts/
      chart: objecttypen
      targetRevision: "1.6.1"
      helm:
        valueFiles:
          - $values/values/objecttypen.yaml
    - repoURL: https://github.com/Flipowski/zgw-platform
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: objecttypen
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
