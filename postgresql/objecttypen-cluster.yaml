apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: objecttypen-postgres
  namespace: postgresql
spec:
  instances: 2

  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "256MB"

  bootstrap:
    initdb:
      database: objecttypen
      owner: objecttypen
      secret:
        name: objecttypen-db-credentials

  storage:
    size: 5Gi

  monitoring:
    enablePodMonitor: false
