apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: openbeheer-postgres
  namespace: postgresql
spec:
  instances: 2
  imageName: ghcr.io/cloudnative-pg/postgis:17
  enableSuperuserAccess: true

  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "256MB"

  bootstrap:
    initdb:
      database: openbeheer
      owner: openbeheer
      secret:
        name: openbeheer-db-credentials

  storage:
    size: 10Gi

  monitoring:
    enablePodMonitor: false
