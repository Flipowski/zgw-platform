apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: opennotificaties-postgres
  namespace: postgresql
spec:
  instances: 2

  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "256MB"

  bootstrap:
    initdb:
      database: opennotificaties
      owner: opennotificaties
      secret:
        name: opennotificaties-db-credentials

  storage:
    size: 10Gi

  monitoring:
    enablePodMonitor: false
